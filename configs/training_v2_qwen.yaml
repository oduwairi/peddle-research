# Draper.ai — Training v2 Configuration (Arm A: Qwen3-8B)
#
# Bake-off arm: Qwen3-8B trained on the v2 dataset.
#
# Why this arm exists:
#   v2 data emits assistant content as `<think>...</think>\n\n{deliverable}`.
#   Qwen3's native hybrid-thinking mode uses literal `<think>...</think>` tags,
#   so the data shape matches the base model's RL prior exactly. This is the
#   native-aligned baseline for the v2 bake-off; the Gemma 4 arms (bare in
#   training_v2.yaml, native channel in training_v2_gemma_native.yaml) are
#   measured against it.
#
# Hyperparameters intentionally mirror training_v2.yaml (r=64, lora_alpha=128,
# max_length=8192, lr=1.5e-4, 3 epochs, DoRA + rsLoRA, assistant_only_loss).
# v1 used r=32 / max_length=4096 / lr=2e-4 for Qwen3, but the bake-off needs
# uniform knobs across arms — only base_model + dataset shape may vary.
#
# Loaded by draper.training.config.TrainingConfig.from_yaml().

training:
  # ---- Model -----------------------------------------------------------
  # Dynamic-2.0 4-bit pre-quant for QLoRA (same repo v1 used). The plain
  # unsloth/Qwen3-8B repo is fp16 instruct — wrong target for QLoRA.
  base_model: unsloth/Qwen3-8B-unsloth-bnb-4bit
  smoke_base_model: unsloth/Qwen2.5-0.5B-Instruct
  load_in_4bit: true
  max_length: 8192

  # ---- LoRA / PEFT -----------------------------------------------------
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  init_lora_weights: true
  use_rslora: true
  use_dora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

  # ---- Optimizer / schedule -------------------------------------------
  learning_rate: 1.5e-4
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  weight_decay: 0.0
  optim: adamw_8bit
  bf16: true
  seed: 42

  # ---- SFT-specific ---------------------------------------------------
  packing: false
  padding_free: false
  use_liger_kernel: false
  assistant_only_loss: true

  # ---- Eval / checkpointing -------------------------------------------
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  save_total_limit: 5
  logging_steps: 1
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 2

  # ---- Tracking -------------------------------------------------------
  report_to: trackio
  trackio_project: draper-v2-qwen3

  # ---- Paths ----------------------------------------------------------
  dataset_dir: data/constructed_v2/final_v2
  output_dir: outputs/draper-v2-qwen3
  merged_dir: outputs/draper-v2-qwen3/merged

  # ---- Smoke overrides ------------------------------------------------
  smoke:
    n_examples: 100
    max_steps: 50
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 1
