# Draper.ai — Training v2 Configuration (Arm C: Gemma 4 native channel)
#
# Bake-off arm: Gemma 4 E4B trained on a re-rendered v2 dataset that uses
# Gemma's native think channel control tokens (`<|channel>thought ... <channel|>`)
# instead of the bare `<think>...</think>` tags from the source dataset.
#
# Why this arm exists:
#   training_v2.yaml (Arm B) takes path (a) per Gotcha #1: discard Gemma's
#   RL prior on thinking and train it to emit our bare `<think>` tags. This
#   arm takes path (b): preserve the RL prior by reshaping the data to match
#   the channel tokens the base was trained on. A vs B/C measures whether the
#   RL prior actually buys anything for ad-copy generation.
#
# Pre-requisite: the channel-token dataset must already be on disk at
# `data/constructed_v2/final_v2_gemma_native/`. Generate it with:
#   python scripts/construct_v2/render_for_gemma.py
#
# Loaded by draper.training.config.TrainingConfig.from_yaml().

training:
  # ---- Model -----------------------------------------------------------
  # Same base weights as Arm B (configs/training_v2.yaml). Only the data
  # shape differs between the two Gemma arms.
  base_model: unsloth/gemma-4-E4B-it-unsloth-bnb-4bit
  smoke_base_model: unsloth/Qwen2.5-0.5B-Instruct
  load_in_4bit: true
  max_length: 8192

  # ---- LoRA / PEFT -----------------------------------------------------
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  init_lora_weights: true
  use_rslora: true
  use_dora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

  # ---- Optimizer / schedule -------------------------------------------
  learning_rate: 1.5e-4
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  weight_decay: 0.0
  optim: adamw_8bit
  bf16: true
  seed: 42

  # ---- SFT-specific ---------------------------------------------------
  packing: false
  padding_free: false
  use_liger_kernel: false
  assistant_only_loss: true

  # ---- Eval / checkpointing -------------------------------------------
  eval_strategy: steps
  eval_steps: 50
  save_strategy: steps
  save_steps: 50
  save_total_limit: 5
  logging_steps: 1
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  early_stopping_patience: 2

  # ---- Tracking -------------------------------------------------------
  report_to: trackio
  trackio_project: draper-v2-gemma4-native

  # ---- Paths ----------------------------------------------------------
  dataset_dir: data/constructed_v2/final_v2_gemma_native
  output_dir: outputs/draper-v2-gemma4-native
  merged_dir: outputs/draper-v2-gemma4-native/merged

  # ---- Smoke overrides ------------------------------------------------
  smoke:
    n_examples: 100
    max_steps: 50
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 1
