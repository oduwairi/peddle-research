# Draper.ai — Construction v2 Configuration
#
# Unified single-pass pipeline. One teacher call per ad emits
# <brief> + <think> + deliverable. Each provider is bound to a concrete
# model under `providers`. Smoke runs are the same pipeline at a
# smaller target_count, optionally scoped via `construct_v2 ... --run-id`.
#
# See docs/project/CONSTRUCTION_V2_ARCHITECTURE.md for the design.

construction_v2:
  output_dir: data/constructed_v2
  final_dir: data/final_v2
  audit_dir: data/constructed_v2/_audit

  selection:
    # Source corpus — JSONL preserves the nested ScoredAd schema that
    # downstream stages rely on (fidelity check reads ad.ad_copy.*).
    scored_ads_path: data/scored/v3/scored_ads.jsonl
    # Production target. Override with `select --target N` for smoke
    # runs (e.g. 100 for the kick-off).
    target_count: 3000
    # v3 composite cutoff. 0.7 keeps roughly the top quintile of the
    # corpus (smoke run: 55,160 → ~5,000 above 0.7).
    min_composite: 0.7
    stratify: platform
    # v3 corpus is overwhelmingly facebook; we accept platform skew but
    # cap it via `max_platform_share` so a single-platform degenerate
    # selection can't sneak through.
    allow_unbalanced: false
    max_platform_share: 0.50

    # ---- v1-parity quality gates ----
    # Minimum copy length (headline+body+description+cta chars).
    min_copy_chars: 30
    # Drop ads where language is labelled and != "en". Empty/undetected
    # passes through.
    english_only: true
    # Content safety: drop only the curated unsafe label set above the
    # confidence floor. hate_discrimination and violence_graphic are
    # intentionally excluded — too many false positives at scale.
    drop_unsafe: true
    content_safety_min_confidence: 0.9
    unsafe_labels_to_drop:
      - adult_sexual
      - profanity
      - shock_misleading
      - substance_drugs
    # Drop ads whose business_vertical was assigned with <0.5 confidence.
    business_vertical_min_confidence: 0.5
    # Compliance-driven vertical exclusions.
    drop_verticals:
      - gambling_betting
      - pharmaceuticals
      - cannabis_cbd
      - political_advocacy
      - religious_faith
    # Drop ads whose copy is religious scripture (Quranic/Bible verses).
    drop_religious_scripture: true
    # Reject obvious scraper artifacts in headlines (URLs, hashtag dumps,
    # headline==body duplicates, wall-of-text without body).
    drop_structural_artifacts: true
    # Drop ads the verticals labeler rated 1 (broken) or 2 (pure
    # clickbait / non-ad content like marketplace spec sheets). v3's
    # survivability signal can be gamed by corrupt active_days on
    # marketplace listings; this label is the catch-net. Ads with
    # training_quality == 0 (unlabelled) pass through.
    min_training_quality: 3
    seed: 42

  # Per-provider teacher model bindings. Same models as the cross-provider
  # smoke that produced data/constructed_v2/smoke/_audit_shared/
  # single_pass_comparison_20260521_005643.md.
  providers:
    anthropic:
      model: claude-sonnet-4-6
      max_tokens: 4000
      temperature: 0.4
    openai:
      model: gpt-5.4
      max_tokens: 4000
      temperature: 0.4
    gemini:
      model: gemini-3.1-pro-preview
      max_tokens: 4000
      temperature: 0.4

  single_pass:
    # Bridge fields must not share any 5-gram with the source ad copy.
    # Enforced post-hoc by the leak guard during ingest.
    forbid_ngram_overlap: 5
    briefs_cache_path: data/constructed_v2/copywriting/briefs.jsonl

  batch:
    # Force-cancel a batch that has not reached terminal state after
    # this many minutes. Defends against the observed OpenAI 3-day
    # `validating` hang. 6 hours covers the 24h SLA's normal variance
    # with margin to spare.
    stuck_timeout_minutes: 360
    auto_force_cancel: true
    # Trip ``PartialFailureThreshold`` when provider-side errors exceed
    # this fraction of the request count. 5% is generous; tighten if
    # we observe systemic quality issues at a provider.
    max_partial_error_rate: 0.05

  filter:
    dedup_similarity_threshold: 0.95
    max_tokens: 8192
    min_deliverable_chars: 40

  dataset:
    train_ratio: 0.90
    val_ratio: 0.05
    test_ratio: 0.05
    seed: 42
