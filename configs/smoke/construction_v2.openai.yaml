# Smoke config: 10-ad cross-provider teacher comparison (OpenAI arm).
# Shares `audit_dir` with the other two smoke configs so `select` is run
# exactly once and all three providers see the same 10 source ads.
construction_v2:
  output_dir: data/constructed_v2/smoke/openai
  final_dir: data/final_v2/smoke/openai
  audit_dir: data/constructed_v2/smoke/_audit_shared

  selection:
    scored_ads_path: data/scored/v3/scored_ads.jsonl
    target_count: 10
    min_composite: 0.7
    stratify: platform
    allow_unbalanced: true
    min_copy_chars: 30
    english_only: true
    drop_unsafe: true
    business_vertical_min_confidence: 0.5
    drop_religious_scripture: true
    drop_structural_artifacts: true
    min_training_quality: 3
    seed: 42

  brief_extraction:
    model: gpt-5.4-mini
    max_tokens: 3000
    temperature: 0.3
    forbid_ngram_overlap: 5
    cache_path: data/constructed_v2/smoke/openai/briefs.jsonl

  rationale:
    model: gpt-5.4-mini
    max_tokens: 4000
    temperature: 0.4

  filter:
    dedup_similarity_threshold: 0.95
    max_tokens: 8192
    min_deliverable_chars: 40

  dataset:
    train_ratio: 0.90
    val_ratio: 0.05
    test_ratio: 0.05
    seed: 42
