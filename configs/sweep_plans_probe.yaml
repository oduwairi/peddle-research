# Draper.ai — Expanded Vertical Sweep (final burn — 320 calls)
#
# Round 3-4 finding: FB has unlimited depth on AdFlex; TT/X/Pinterest
# exhaust at 2-3 pages on "universal" keywords. Adding platform-native
# vocabulary per platform to give TT/X/Pinterest real inventory to chew through.
# Budget rebalanced to force non-FB spending.
#
# Run with: collect run --budget 320 --plan-path configs/sweep_plans_probe.yaml --max-pages 20 --auto

budget:
  total_credits: 500000
  credits_per_call: 100
  ads_per_page: 18

geo_groups:
  en_only: [1000001]

platforms:
  facebook:
    budget_pct: 0.15
    sweeps:
      - name: expanded_verticals
        description: Keep existing FB keywords (already strong yield); budget limited to force share to other platforms
        keywords:
          # Local / home services
          - "emergency plumber"
          - "roof repair"
          - "hvac service"
          - "pest control near me"
          - "electrician near me"
          - "house cleaning service"
